name: CI

# When does this run?
on:
  push:
    branches: [main]      # every push to main
  pull_request:           # and every PR (against any branch)

jobs:
  test:
    runs-on: ubuntu-latest

    # Service containers: GitHub spins these up next to the job, just like
    # `docker compose up` does locally. Tests connect to them on localhost.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: wfm
          POSTGRES_PASSWORD: wfm
          POSTGRES_DB: wfm
        ports:
          - 5432:5432
        # Don't start the job until Postgres answers — avoids race conditions.
        options: >-
          --health-cmd "pg_isready -U wfm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Same variables your .env provides locally. No secrets here — these are
    # throwaway CI credentials for an ephemeral database.
    env:
      DATABASE_URL: "postgresql://wfm:wfm@localhost:5432/wfm?schema=public"
      DIRECT_DATABASE_URL: "postgresql://wfm:wfm@localhost:5432/wfm?schema=public"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      JWT_SECRET: "ci-secret-not-used-by-rest-tests"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations          # mirrors RUN-LOCALLY.md step 4
        run: npx prisma migrate deploy

      - name: Apply partial indexes      # mirrors RUN-LOCALLY.md step 5
        run: PGPASSWORD=wfm psql -h localhost -U wfm -d wfm -f prisma/extra.sql

      - name: Seed test org + employee   # mirrors RUN-LOCALLY.md step 6
        run: npm run seed

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
