name: CI/CD

# When does this run?
on:
  push:
    branches: [main]      # every push to main
  pull_request:           # and every PR (against any branch)

jobs:
  # ---- CI: prove the code is healthy -----------------------------------------
  test:
    runs-on: ubuntu-latest

    # Service containers: GitHub spins these up next to the job, just like
    # `docker compose up` does locally. Tests connect to them on localhost.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: wfm
          POSTGRES_PASSWORD: wfm
          POSTGRES_DB: wfm
        ports:
          - 5432:5432
        # Don't start the job until Postgres answers — avoids race conditions.
        options: >-
          --health-cmd "pg_isready -U wfm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Same variables your .env provides locally. No secrets here — these are
    # throwaway CI credentials for an ephemeral database.
    env:
      DATABASE_URL: "postgresql://wfm:wfm@localhost:5432/wfm?schema=public"
      DIRECT_DATABASE_URL: "postgresql://wfm:wfm@localhost:5432/wfm?schema=public"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      JWT_SECRET: "ci-secret-not-used-by-rest-tests"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations          # mirrors RUN-LOCALLY.md step 4
        run: npx prisma migrate deploy

      - name: Apply partial indexes      # mirrors RUN-LOCALLY.md step 5
        run: PGPASSWORD=wfm psql -h localhost -U wfm -d wfm -f prisma/extra.sql

      - name: Seed test org + employee   # mirrors RUN-LOCALLY.md step 6
        run: npm run seed

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  # ---- CD: build & publish the container image -------------------------------
  # Only on pushes to main (not PRs), and only if `test` passed. Publishes to
  # GitHub Container Registry (GHCR) using the repo's built-in token — no extra
  # secrets to configure. The image is what you deploy on a server.
  publish-image:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # required to push to GHCR
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha                       # also tag with the commit SHA

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
